---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
  name: plugins.mcp.suse.com
spec:
  group: mcp.suse.com
  names:
    categories:
    - suse-ai
    - mcp
    kind: Plugin
    listKind: PluginList
    plural: plugins
    shortNames:
    - mcpplug
    singular: plugin
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.serviceType
      name: Type
      type: string
    - jsonPath: .spec.serviceURL
      name: URL
      type: string
    - jsonPath: .status.healthy
      name: Healthy
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Plugin is the declarative form of POST /plugins/register: a third-party
          HTTP service the proxy fronts to extend its capabilities (smartagents
          runtimes, registry providers, virtualmcp gateways). The PluginReconciler
          (#19+) projects Plugin CRs into the in-process PluginServiceManager and
          keeps Status in sync with health-probe results.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PluginSpec is the declarative form of POST /plugins/register: a
              third-party HTTP service that extends the proxy with capabilities the
              proxy itself does not implement (smartagents runtimes, external registry
              providers, virtualmcp gateways). The PluginReconciler (#19+) projects
              this CR into the in-process PluginServiceManager so requests matching
              Capabilities[].Path are forwarded to ServiceURL.
            properties:
              capabilities:
                description: |-
                  Capabilities lists the API surfaces this plugin handles. Empty
                  disables routing (the plugin remains visible to operators but
                  receives no traffic).
                items:
                  description: |-
                    PluginCapability describes one API surface the plugin exposes through the
                    proxy. The proxy uses Path/Methods to route incoming requests to the
                    plugin; Description is informational only.
                  properties:
                    description:
                      description: Description is a free-form summary surfaced in
                        UIs.
                      type: string
                    methods:
                      description: |-
                        Methods are the HTTP methods the plugin accepts on Path. Empty means
                        all methods are forwarded.
                      items:
                        type: string
                      type: array
                    path:
                      description: |-
                        Path is the API path the plugin handles, with optional wildcards
                        (e.g. "/v1/*", "/agents/*").
                      minLength: 1
                      type: string
                  required:
                  - path
                  type: object
                type: array
              description:
                description: Description is a free-form summary surfaced in UIs.
                type: string
              healthCheck:
                description: |-
                  HealthCheck configures the controller's liveness probe against the
                  plugin. When nil the controller uses defaults (GET /health every
                  30s, 5s timeout).
                properties:
                  intervalSeconds:
                    description: IntervalSeconds is the polling cadence. Defaults
                      to 30 when unset.
                    format: int32
                    minimum: 1
                    type: integer
                  path:
                    description: |-
                      Path is the HTTP path to poll on the plugin's ServiceURL. Defaults
                      to "/health" when unset.
                    type: string
                  timeoutSeconds:
                    description: TimeoutSeconds caps each probe. Defaults to 5 when
                      unset.
                    format: int32
                    minimum: 1
                    type: integer
                type: object
              serviceType:
                description: ServiceType selects which manager wires up this plugin.
                enum:
                - smartagents
                - registry
                - virtualmcp
                type: string
              serviceURL:
                description: |-
                  ServiceURL is the base URL the proxy forwards matched requests to.
                  Must be reachable from the proxy pod (cluster-internal Service DNS
                  or a routable external URL).
                minLength: 1
                type: string
              version:
                description: |-
                  Version is a free-form version string surfaced in UIs and matched
                  against capability filters. Plugin authors should follow semver.
                type: string
            required:
            - serviceType
            - serviceURL
            type: object
          status:
            description: PluginStatus reflects the observed state of a Plugin.
            properties:
              conditions:
                description: Conditions track Ready / Registered / Healthy semantics.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              healthy:
                description: |-
                  Healthy is the last health-probe result. False means the most
                  recent probe failed or timed out.
                type: boolean
              lastHealthCheckMessage:
                description: |-
                  LastHealthCheckMessage carries the most recent probe error string
                  when Healthy=false. Empty on success.
                type: string
              lastHealthCheckTime:
                description: |-
                  LastHealthCheckTime is when the controller last completed a health
                  probe against the plugin.
                format: date-time
                type: string
              observedCapabilities:
                description: |-
                  ObservedCapabilities is the capability list the controller has
                  successfully wired into the in-process PluginServiceManager. May
                  diverge from Spec.Capabilities during a rollout.
                items:
                  description: |-
                    PluginCapability describes one API surface the plugin exposes through the
                    proxy. The proxy uses Path/Methods to route incoming requests to the
                    plugin; Description is informational only.
                  properties:
                    description:
                      description: Description is a free-form summary surfaced in
                        UIs.
                      type: string
                    methods:
                      description: |-
                        Methods are the HTTP methods the plugin accepts on Path. Empty means
                        all methods are forwarded.
                      items:
                        type: string
                      type: array
                    path:
                      description: |-
                        Path is the API path the plugin handles, with optional wildcards
                        (e.g. "/v1/*", "/agents/*").
                      minLength: 1
                      type: string
                  required:
                  - path
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the spec generation the controller
                  last acted on.
                format: int64
                type: integer
              phase:
                description: Phase is the high-level rollup of Conditions.
                enum:
                - Pending
                - Registered
                - Healthy
                - Unhealthy
                - Failed
                type: string
              registeredAt:
                description: |-
                  RegisteredAt is when the plugin was first projected into the
                  in-process manager (replaces the HTTP registration timestamp).
                format: date-time
                type: string
              responseTimeMillis:
                description: |-
                  ResponseTimeMillis is the most recent probe latency in
                  milliseconds, surfaced for quick triage.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
