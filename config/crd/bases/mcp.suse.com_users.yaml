---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
  name: users.mcp.suse.com
spec:
  group: mcp.suse.com
  names:
    categories:
    - suse-ai
    - mcp
    kind: User
    listKind: UserList
    plural: users
    shortNames:
    - mcpuser
    singular: user
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.authProvider
      name: Provider
      type: string
    - jsonPath: .spec.email
      name: Email
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          User is a proxy-internal identity used by RouteAssignment to govern access
          to Adapters / VirtualMCPRoutes / Agents through the proxy data plane.
          Distinct from Kubernetes RBAC subjects, which govern operator access.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              UserSpec declares a proxy-internal user. This is the proxy's auth model,
              complementary to native Kubernetes RBAC: cluster admins manage operator
              access via RBAC, while User/Group/RouteAssignment govern who can invoke
              MCP tools through the proxy data plane.
            properties:
              authProvider:
                description: |-
                  AuthProvider selects which identity source backs this user. Defaults
                  to "local" if unset.
                enum:
                - local
                - github
                - rancher
                type: string
              displayName:
                description: DisplayName is the human-readable name shown in UIs.
                type: string
              email:
                description: |-
                  Email is the user's email address; used as the login identifier for
                  local-provider users and for display when federating.
                type: string
              externalID:
                description: |-
                  ExternalID is the provider-side identifier (e.g. GitHub user id) used
                  to correlate federated logins back to this User. Ignored when
                  AuthProvider=local.
                type: string
              groups:
                description: |-
                  Groups names Group CRs (same namespace) this user belongs to. The
                  reverse edge lives in Group.Spec.Members; both are kept in sync by the
                  UserReconciler (denormalized to match the existing model). Membership
                  drives RouteAssignment matching at request time.
                items:
                  description: |-
                    LocalObjectReference contains enough information to let you locate the
                    referenced object inside the same namespace.
                  properties:
                    name:
                      default: ""
                      description: |-
                        Name of the referent.
                        This field is effectively required, but due to backwards compatibility is
                        allowed to be empty. Instances of this type with an empty value here are
                        almost certainly wrong.
                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                      type: string
                  type: object
                  x-kubernetes-map-type: atomic
                type: array
              passwordSecretRef:
                description: |-
                  PasswordSecretRef references a Secret holding the bcrypt password hash
                  for local-provider users. The key inside the Secret holds the hash;
                  the plaintext password is never stored in the CR. Ignored when
                  AuthProvider is anything other than "local".
                properties:
                  key:
                    description: The key of the secret to select from.  Must be a
                      valid secret key.
                    type: string
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                  optional:
                    description: Specify whether the Secret or its key must be defined
                    type: boolean
                required:
                - key
                type: object
                x-kubernetes-map-type: atomic
              providerGroups:
                description: |-
                  ProviderGroups are the raw group/team strings asserted by the external
                  provider (e.g. "myorg/sre"). The proxy maps these to Group CRs at
                  login time; surfaced here for auditing and debugging.
                items:
                  type: string
                type: array
            type: object
          status:
            description: UserStatus reflects the observed state of a User.
            properties:
              conditions:
                description: Conditions track Ready / GroupsResolved semantics.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastLoginTime:
                description: LastLoginTime is when the user last successfully authenticated.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the spec generation the controller
                  last acted on.
                format: int64
                type: integer
              passwordChangedTime:
                description: |-
                  PasswordChangedTime is when the local-provider password was last
                  rotated. Nil for non-local providers.
                format: date-time
                type: string
              phase:
                description: Phase is the high-level rollup of Conditions.
                enum:
                - Pending
                - Active
                - Disabled
                - Failed
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
