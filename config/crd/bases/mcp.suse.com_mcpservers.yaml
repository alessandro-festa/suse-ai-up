---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
  name: mcpservers.mcp.suse.com
spec:
  group: mcp.suse.com
  names:
    categories:
    - suse-ai
    - mcp
    kind: MCPServer
    listKind: MCPServerList
    plural: mcpservers
    shortNames:
    - mcpsrv
    singular: mcpserver
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.sourceRegistry
      name: Registry
      type: string
    - jsonPath: .status.priority
      name: Priority
      type: integer
    - jsonPath: .spec.image
      name: Image
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          MCPServer is one entry per MCP server definition. Typically created by an
          MCPRegistry controller (via OwnerReference) from a source registry; can
          also be created standalone for one-off declarative entries.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              MCPServerSpec is the declarative form of an MCP server entry. The same
              shape is used both as a standalone CR's Spec and as an entry inside
              MCPRegistrySpec.Source.Inline.
            properties:
              categories:
                description: Categories group servers by domain (e.g. "monitoring",
                  "ci").
                items:
                  type: string
                type: array
              command:
                description: |-
                  Command is the entrypoint command for non-containerized servers
                  (commandType python/npx/pip). Derived from meta.sidecarConfig.command
                  in registry YAML entries.
                type: string
              commandType:
                description: |-
                  CommandType identifies the launcher family (docker, npx, python, pip).
                  Derived from meta.sidecarConfig.commandType in registry YAML entries.
                type: string
              description:
                description: Description is a short summary of what this server provides.
                type: string
              displayName:
                description: DisplayName is the human-readable name shown in UIs.
                type: string
              image:
                description: Image is the primary container image for containerized
                  servers.
                type: string
              packages:
                description: Packages are the shipped artifacts (OCI image, npm package,
                  etc.).
                items:
                  description: |-
                    MCPServerPackage describes one shipped artifact (OCI image, npm package,
                    etc.) that runs the MCP server.
                  properties:
                    environmentVariables:
                      description: EnvironmentVariables documents the env vars the
                        package recognizes.
                      items:
                        description: |-
                          MCPServerEnvVar describes a runtime environment variable the server
                          expects. It is purely declarative — the Adapter that consumes this
                          MCPServer is responsible for satisfying secret values.
                        properties:
                          default:
                            description: Default is the value used when no Adapter
                              override is supplied.
                            type: string
                          description:
                            description: Description is a short human-readable note
                              about the variable.
                            type: string
                          format:
                            description: |-
                              Format is a hint about the expected value shape (string, number,
                              boolean).
                            enum:
                            - string
                            - number
                            - boolean
                            type: string
                          isSecret:
                            description: |-
                              IsSecret marks the variable as sensitive so UIs render it accordingly
                              and Adapter authors know to supply it via Secret rather than inline.
                            type: boolean
                          name:
                            description: Name is the environment variable name.
                            type: string
                        required:
                        - name
                        type: object
                      type: array
                    identifier:
                      description: |-
                        Identifier is the package identifier inside RegistryType (e.g.
                        `docker.io/user/image:tag`).
                      type: string
                    registryType:
                      description: RegistryType identifies the package registry (oci,
                        npm, pypi, etc.).
                      type: string
                    transport:
                      description: Transport is how the proxy speaks to this package
                        once running.
                      properties:
                        type:
                          description: Type is the transport identifier (stdio, sse,
                            websocket, http).
                          enum:
                          - stdio
                          - sse
                          - websocket
                          - http
                          type: string
                      required:
                      - type
                      type: object
                  required:
                  - identifier
                  - registryType
                  - transport
                  type: object
                type: array
              port:
                description: Port is the network port the server listens on.
                format: int32
                maximum: 65535
                minimum: 1
                type: integer
              repository:
                description: Repository describes where the server source lives.
                properties:
                  source:
                    description: Source identifies the hosting service (github, gitlab,
                      etc.).
                    type: string
                  url:
                    description: URL is the repository URL.
                    type: string
                required:
                - url
                type: object
              tags:
                description: Tags are free-form labels used for search/filter.
                items:
                  type: string
                type: array
              url:
                description: URL is the endpoint for remote-hosted MCP servers.
                type: string
              version:
                description: Version is the upstream version this entry describes.
                type: string
            type: object
          status:
            description: MCPServerStatus reflects the observed state of an MCPServer.
            properties:
              conditions:
                description: Conditions track Ready / Conflict semantics.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the spec generation the controller
                  last acted on.
                format: int64
                type: integer
              phase:
                description: Phase is the high-level rollup of Conditions.
                enum:
                - Pending
                - Active
                - Conflict
                - Inactive
                type: string
              priority:
                description: |-
                  Priority is copied from the originating MCPRegistry.Spec.Priority and
                  used by other registries' reconcilers to detect/resolve name conflicts.
                format: int32
                type: integer
              sourceRegistry:
                description: |-
                  SourceRegistry is the name of the MCPRegistry that owns this entry.
                  Set automatically by MCPRegistryReconciler via OwnerReference; surfaced
                  here for convenient querying.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
