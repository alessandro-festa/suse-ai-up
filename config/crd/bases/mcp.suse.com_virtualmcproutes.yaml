  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
  name: virtualmcproutes.mcp.suse.com
spec:
  group: mcp.suse.com
  names:
    categories:
    - suse-ai
    - mcp
    kind: VirtualMCPRoute
    listKind: VirtualMCPRouteList
    plural: virtualmcproutes
    shortNames:
    - vroute
    singular: virtualmcproute
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.exposedAs
      name: ExposedAs
      type: string
    - jsonPath: .status.entryCount
      name: Entries
      type: integer
    - jsonPath: .status.lastResolvedTime
      name: LastResolved
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          VirtualMCPRoute composes a new MCP endpoint out of selected tools,
          resources, and prompts from one or more Adapters / MCPServers. The
          VirtualMCPRouteReconciler (#17) resolves the flattened catalog and
          publishes it into the proxy's in-process routing table — no Kubernetes
          workload is created for a route.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              VirtualMCPRouteSpec defines the desired state of a VirtualMCPRoute — a
              composed MCP endpoint built from selected tools/resources of one or more
              Adapters / MCPServers. Served at /api/v1/vroutes/{exposedAs}/mcp by the
              proxy.
            properties:
              acl:
                description: |-
                  ACL names RouteAssignment CRs governing who can invoke this route.
                  Empty means no per-route ACL is enforced (the cluster-wide default
                  still applies).
                items:
                  description: |-
                    LocalObjectReference contains enough information to let you locate the
                    referenced object inside the same namespace.
                  properties:
                    name:
                      default: ""
                      description: |-
                        Name of the referent.
                        This field is effectively required, but due to backwards compatibility is
                        allowed to be empty. Instances of this type with an empty value here are
                        almost certainly wrong.
                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                      type: string
                  type: object
                  x-kubernetes-map-type: atomic
                type: array
              description:
                description: Description is a human-readable summary shown in UIs.
                type: string
              exposedAs:
                description: |-
                  ExposedAs is the path segment under /api/v1/vroutes/ where this route
                  is served. Defaults to metadata.name when unset.
                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                type: string
              sources:
                description: |-
                  Sources are the Adapter / MCPServer references contributing entries
                  to this route.
                items:
                  description: |-
                    VirtualMCPSource is one Adapter or MCPServer contributing entries to the
                    virtual route. Exactly one of AdapterRef / MCPServerRef must be set.
                  properties:
                    adapterRef:
                      description: |-
                        AdapterRef references an Adapter CR (same namespace) to draw entries
                        from.
                      properties:
                        name:
                          default: ""
                          description: |-
                            Name of the referent.
                            This field is effectively required, but due to backwards compatibility is
                            allowed to be empty. Instances of this type with an empty value here are
                            almost certainly wrong.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                          type: string
                      type: object
                      x-kubernetes-map-type: atomic
                    mcpServerRef:
                      description: |-
                        MCPServerRef references an MCPServer CR (same namespace) to draw
                        entries from.
                      properties:
                        name:
                          default: ""
                          description: |-
                            Name of the referent.
                            This field is effectively required, but due to backwards compatibility is
                            allowed to be empty. Instances of this type with an empty value here are
                            almost certainly wrong.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                          type: string
                      type: object
                      x-kubernetes-map-type: atomic
                    prompts:
                      description: Prompts selects which prompts to include.
                      properties:
                        all:
                          description: All matches every entry in the source's catalog.
                          type: boolean
                        names:
                          description: Names is an explicit allow-list of entry names.
                          items:
                            type: string
                          type: array
                        prefix:
                          description: Prefix matches any entry whose name starts
                            with this string.
                          type: string
                        regex:
                          description: Regex matches any entry whose name matches
                            this Go regexp.
                          type: string
                      type: object
                    resources:
                      description: Resources selects which resources to include.
                      properties:
                        all:
                          description: All matches every entry in the source's catalog.
                          type: boolean
                        names:
                          description: Names is an explicit allow-list of entry names.
                          items:
                            type: string
                          type: array
                        prefix:
                          description: Prefix matches any entry whose name starts
                            with this string.
                          type: string
                        regex:
                          description: Regex matches any entry whose name matches
                            this Go regexp.
                          type: string
                      type: object
                    rewrite:
                      description: |-
                        Rewrite renames selected entries with a prefix/suffix to avoid
                        collisions with entries from other sources.
                      properties:
                        prefix:
                          description: Prefix prepended to every selected name.
                          type: string
                        suffix:
                          description: Suffix appended to every selected name.
                          type: string
                      type: object
                    tools:
                      description: |-
                        Tools selects which tools to include. Defaults to none if unset (use
                        {all: true} to include them all).
                      properties:
                        all:
                          description: All matches every entry in the source's catalog.
                          type: boolean
                        names:
                          description: Names is an explicit allow-list of entry names.
                          items:
                            type: string
                          type: array
                        prefix:
                          description: Prefix matches any entry whose name starts
                            with this string.
                          type: string
                        regex:
                          description: Regex matches any entry whose name matches
                            this Go regexp.
                          type: string
                      type: object
                  type: object
                minItems: 1
                type: array
            required:
            - sources
            type: object
          status:
            description: VirtualMCPRouteStatus reflects the observed state of a VirtualMCPRoute.
            properties:
              conditions:
                description: Conditions track Ready / SourceMissing / Conflict semantics.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              endpointURL:
                description: |-
                  EndpointURL is the proxy-fronted MCP URL clients use to reach this
                  route (e.g. http://proxy/api/v1/vroutes/<exposedAs>/mcp).
                type: string
              entryCount:
                description: |-
                  EntryCount is the size of ResolvedEntries; surfaced as its own field
                  so it can be a printer column without paging through the full list.
                format: int32
                type: integer
              lastResolvedTime:
                description: |-
                  LastResolvedTime is when the controller last successfully resolved
                  the catalog.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the spec generation the controller
                  last acted on.
                format: int64
                type: integer
              phase:
                description: Phase is the high-level rollup of Conditions.
                enum:
                - Pending
                - Resolving
                - Ready
                - Degraded
                - Failed
                type: string
              resolvedEntries:
                description: |-
                  ResolvedEntries is the flattened catalog with origin metadata. Large
                  routes can produce large status payloads — UIs that need only a count
                  should read Status.EntryCount instead.
                items:
                  description: |-
                    ResolvedEntry is one tool / resource / prompt flattened into the route's
                    catalog after selectors and rewrites are applied.
                  properties:
                    kind:
                      description: Kind tells clients which MCP catalog this entry
                        belongs to.
                      enum:
                      - tool
                      - resource
                      - prompt
                      type: string
                    name:
                      description: Name is the externally exposed name (after rewrite).
                      type: string
                    originalName:
                      description: |-
                        OriginalName is the entry's name on its source (pre-rewrite); empty
                        when no rewrite was applied.
                      type: string
                    sourceAdapter:
                      description: SourceAdapter is the Adapter CR name the entry
                        came from, if any.
                      type: string
                    sourceMCPServer:
                      description: SourceMCPServer is the MCPServer CR name the entry
                        came from, if any.
                      type: string
                  required:
                  - kind
                  - name
                  type: object
                type: array
                x-kubernetes-list-type: atomic
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
