{{- if .Values.rbac.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "suse-ai-up.fullname" . }}-cluster-role
  labels:
    {{- include "suse-ai-up.labels" . | nindent 4 }}
rules:
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["pods", "services", "pods/log", "events", "namespaces", "configmaps", "secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# P2.4/PR1: consolidated binary runs the kubebuilder reconcilers in-process.
# Mirrors the generated config/rbac/role.yaml so `helm install` produces a
# manager pod that can actually watch its CRDs.
- apiGroups: ["mcp.suse.com"]
  resources:
  - adapters
  - agents
  - groups
  - mcpregistries
  - mcpservers
  - plugins
  - routeassignments
  - users
  - virtualmcproutes
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["mcp.suse.com"]
  resources:
  - adapters/status
  - agents/status
  - groups/status
  - mcpregistries/status
  - mcpservers/status
  - plugins/status
  - routeassignments/status
  - users/status
  - virtualmcproutes/status
  verbs: ["get", "patch", "update"]
- apiGroups: ["mcp.suse.com"]
  resources:
  - adapters/finalizers
  - agents/finalizers
  - groups/finalizers
  - mcpregistries/finalizers
  - mcpservers/finalizers
  - plugins/finalizers
  - routeassignments/finalizers
  - users/finalizers
  - virtualmcproutes/finalizers
  verbs: ["update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "suse-ai-up.fullname" . }}-sidecar-role
  namespace: {{ .Values.sidecar.namespace }}
  labels:
    {{- include "suse-ai-up.labels" . | nindent 4 }}
rules:
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["pods", "services", "pods/log", "events", "configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# Leader-election Role (P2.7). controller-runtime acquires a Lease in the
# release namespace when started with --leader-elect, and emits Events as
# leadership changes. Without these perms multi-replica deployments
# crashloop on RBAC denials. Single-replica deployments also use these
# (they hold a lease of one); the Lease object cost is negligible.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "suse-ai-up.fullname" . }}-leader-election-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "suse-ai-up.labels" . | nindent 4 }}
rules:
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
{{- end }}